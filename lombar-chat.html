<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lombar IA — Chat Widget (demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
body{background:#f0f7ff;margin:0;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.demo-note{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:13px;padding:6px 18px;border-radius:999px;pointer-events:none;white-space:nowrap;}
.demo-center{text-align:center;color:#6b7280;font-size:15px;}
.demo-center h2{font-family:'Outfit',sans-serif;font-size:22px;color:#1a1a2e;margin-bottom:8px;}
</style>
</head>
<body>

<span class="demo-note">👇 Clique no botão azul no canto inferior direito</span>
<div class="demo-center">
  <h2>Lombar IA — Chat Widget</h2>
  <p>Zero IA · Zero API · Zero custo · Respostas instantâneas<br>Copie o bloco marcado para suas páginas.</p>
</div>

<!-- =====================================================
     INICIO DO WIDGET — copie tudo daqui até FIM DO WIDGET
     e cole antes de </body> em cada uma das suas páginas.
     Nenhuma dependência externa necessária.
====================================================== -->
<style>
#lcWrap,#lcWrap *{box-sizing:border-box;margin:0;padding:0;}
#lcWrap{font-family:'DM Sans',sans-serif;}
#lcBtn{
  position:fixed;bottom:24px;right:20px;z-index:9998;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#1d4ed8,#0891b2);
  color:#fff;border:none;border-radius:999px;
  padding:14px 20px 14px 16px;cursor:pointer;
  box-shadow:0 8px 28px rgba(29,78,216,.45);
  transition:transform .2s;
  animation:lcPulse 3s ease-in-out infinite;
}
#lcBtn:hover{transform:scale(1.04);}
#lcBtn:active{transform:scale(.97);}
@keyframes lcPulse{0%,100%{box-shadow:0 8px 28px rgba(29,78,216,.45);}50%{box-shadow:0 8px 44px rgba(29,78,216,.7);}}
#lcBtnTxt{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;}
#lcDot{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:#ef4444;border-radius:50%;border:2px solid #fff;animation:lcDotPop .4s 2s ease both;}
@keyframes lcDotPop{from{transform:scale(0);}to{transform:scale(1);}}
#lcPanel{
  position:fixed;bottom:88px;right:20px;z-index:9999;
  width:360px;max-width:calc(100vw - 32px);
  background:#fff;border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  display:none;flex-direction:column;
  overflow:hidden;max-height:560px;
  transform-origin:bottom right;
}
#lcPanel.open{display:flex;animation:lcOpen .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes lcOpen{from{opacity:0;transform:scale(.8) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
#lcHead{background:linear-gradient(135deg,#1d4ed8,#0891b2);padding:16px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#lcAva{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
#lcHInfo{flex:1;}
#lcHName{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;color:#fff;}
#lcHSub{font-size:12px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:5px;margin-top:2px;}
.lcGreen{width:7px;height:7px;background:#4ade80;border-radius:50%;}
#lcClose{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
#lcClose:hover{background:rgba(255,255,255,.25);}
#lcMsgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
#lcMsgs::-webkit-scrollbar{width:4px;}
#lcMsgs::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px;}
.lcBub{max-width:85%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.65;animation:lcIn .22s ease both;}
@keyframes lcIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.lcBot{background:#f3f4f6;color:#1a1a2e;align-self:flex-start;border-bottom-left-radius:4px;}
.lcUsr{background:linear-gradient(135deg,#1d4ed8,#0891b2);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
#lcType{display:none;align-self:flex-start;background:#f3f4f6;border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;gap:5px;align-items:center;}
#lcType.on{display:flex;}
.lcD{width:7px;height:7px;background:#9ca3af;border-radius:50%;animation:lcBnc 1.2s ease-in-out infinite;}
.lcD:nth-child(2){animation-delay:.15s;}.lcD:nth-child(3){animation-delay:.3s;}
@keyframes lcBnc{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
#lcQR{padding:6px 12px 12px;display:flex;flex-wrap:wrap;gap:7px;flex-shrink:0;}
.lcQ{background:#eff6ff;color:#1d4ed8;border:1.5px solid #bfdbfe;border-radius:999px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;}
.lcQ:hover{background:#dbeafe;}
.lcQ:active{transform:scale(.96);}
.lcWrap{display:flex;flex-direction:column;}
.lcWrap.u{align-items:flex-end;}
.lcCTA{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#1d4ed8,#0891b2);color:#fff;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;padding:11px 18px;border-radius:10px;text-decoration:none;margin-top:8px;text-align:center;}
.lcCTA:hover{opacity:.9;}
.lcWA{background:#25D366;}
</style>

<div id="lcWrap">
  <button id="lcBtn" onclick="lcTog()">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span id="lcBtnTxt">Falar com especialista</span>
    <div id="lcDot"></div>
  </button>

  <div id="lcPanel">
    <div id="lcHead">
      <div id="lcAva">👩‍⚕️</div>
      <div id="lcHInfo">
        <div id="lcHName">Ana · Lombar IA</div>
        <div id="lcHSub"><span class="lcGreen"></span> Online agora</div>
      </div>
      <button id="lcClose" onclick="lcTog()">✕</button>
    </div>
    <div id="lcMsgs"></div>
    <div id="lcType"><div class="lcD"></div><div class="lcD"></div><div class="lcD"></div></div>
    <div id="lcQR"></div>
  </div>
</div>

<script>
// =====================================================
//  LOMBAR IA — CHAT DE RESPOSTAS FIXAS
//  Sem IA, sem API. Edite os textos em LC_FAQ.
//
//  LC_URL  → página de checkout após clicar em assinar
//  LC_WA   → link do seu WhatsApp Business
// =====================================================

const LC_URL = 'lombar-obrigado.html';
const LC_WA  = 'https://wa.me/5511999999999?text=Ol%C3%A1%2C+vi+o+Lombar+IA+e+gostaria+de+saber+mais.';

// ── Respostas ─────────────────────────────────────────
// msg   → texto da Ana (use \n para quebrar linha)
// opts  → botões que aparecem depois (devem ser chaves de LC_FAQ)
// cta   → true mostra botão de assinar
// wa    → true mostra botão do WhatsApp
const LC_FAQ = {

  inicio: {
    msg: 'Oi! 😊 Sou a Ana, do Lombar IA.\nComo posso te ajudar?',
    opts: ['Funciona para hérnia?','Qual o preço?','Como funciona?','É seguro?','Posso testar grátis?','Tenho mais de 60 anos'],
  },

  'Funciona para hérnia?': {
    msg: 'Sim! Você informa sua condição no cadastro e o plano é adaptado — sem movimentos que possam machucar.\n\nTemos usuários com hérnia L4-L5, L5-S1 e outras condições usando com ótimos resultados.',
    opts: ['Tenho medo de piorar a dor','Qual o preço?','Posso testar grátis?'],
  },

  'Qual o preço?': {
    msg: 'Três opções:\n\n🆓 Gratuito — 3 treinos/semana\n💙 Mensal — R$29,90/mês\n⭐ Anual — R$197/ano (R$16,42/mês)\n\nTodos os pagos têm garantia de 7 dias.',
    opts: ['Vale a pena o mensal?','Posso testar grátis?','Quero assinar agora'],
  },

  'Como funciona?': {
    msg: '1️⃣ Você responde 5 perguntas sobre sua dor\n2️⃣ O app cria seu plano personalizado\n3️⃣ 15 minutos por dia, em casa\n\nSem equipamento. Sem academia.',
    opts: ['Qual o preço?','É seguro?','Posso testar grátis?'],
  },

  'É seguro?': {
    msg: 'Sim! São exercícios de baixo impacto para quem já tem dor.\n\n87% dos usuários sentem melhora em 3 semanas. Mais de 2.400 pessoas com hérnia e tensão muscular usam sem problema.',
    opts: ['Funciona para hérnia?','Qual o preço?','Posso testar grátis?'],
  },

  'Posso testar grátis?': {
    msg: 'Pode! O plano gratuito tem treino 3x por semana e 2 usos do Modo SOS.\n\nÉ suficiente para sentir na pele como funciona antes de assinar.',
    opts: ['Quero testar grátis','Qual o preço?','Como funciona?'],
  },

  'Tenho mais de 60 anos': {
    msg: 'O app foi pensado exatamente para pessoas de 40 a 65 anos! 😊\n\nExercícios simples com imagens e instruções passo a passo. Sem nada difícil ou complicado.',
    opts: ['É seguro?','Qual o preço?','Posso testar grátis?'],
  },

  'Tenho medo de piorar a dor': {
    msg: 'Entendo a preocupação — é muito comum!\n\nOs movimentos são suaves e seguros. Se sentir qualquer desconforto, o app ajusta o plano. E tem garantia de 7 dias.',
    opts: ['Posso testar grátis?','Qual o preço?','Isso substitui o médico?'],
  },

  'Isso substitui o médico?': {
    msg: 'Não substitui — complementa.\n\nO Lombar IA é para o dia a dia entre as consultas. Vários dos nossos usuários usam junto com o tratamento médico.',
    opts: ['Qual o preço?','Posso testar grátis?','Quero assinar agora'],
  },

  'Vale a pena o mensal?': {
    msg: '1 sessão de fisioterapia = R$80 a R$150.\nO mensal = R$29,90 pelos 30 dias completos.\n\nMenos que uma consulta, com garantia de 7 dias.',
    opts: ['Quero assinar agora','Posso testar grátis?'],
    cta: true,
  },

  'Quero assinar agora': {
    msg: 'Ótimo! 🎉 Lembre: você tem 7 dias de garantia — se não gostar por qualquer motivo, devolvemos tudo. Sem perguntas.',
    opts: ['Ainda tenho dúvidas'],
    cta: true,
  },

  'Quero testar grátis': {
    msg: 'Perfeito! Crie sua conta gratuitamente e comece hoje. Se gostar, o upgrade é fácil.',
    opts: ['Ainda tenho dúvidas'],
    cta: true,
  },

  'Ainda tenho dúvidas': {
    msg: 'Sem problema! Me pergunte o que quiser, ou se preferir falar com alguém, é só chamar no WhatsApp. 😊',
    opts: ['Funciona para hérnia?','Tenho mais de 60 anos','Falar no WhatsApp'],
  },

  'Falar no WhatsApp': {
    msg: 'Claro! Clique abaixo e a gente continua por lá. Respondemos rápido! 📲',
    opts: [],
    wa: true,
  },
};

// ── Lógica ────────────────────────────────────────────
let lcOpen = false;
let lcStarted = false;

function lcTog() {
  lcOpen = !lcOpen;
  document.getElementById('lcDot').style.display = 'none';
  document.getElementById('lcPanel').classList.toggle('open', lcOpen);
  if (lcOpen && !lcStarted) { lcStarted = true; lcStep('inicio'); }
}

function lcStep(key, userLabel) {
  const d = LC_FAQ[key];
  if (!d) return;
  if (userLabel) lcBubble('u', userLabel);
  document.getElementById('lcQR').innerHTML = '';
  const typ = document.getElementById('lcType');
  typ.classList.add('on');
  lcScroll();
  setTimeout(() => {
    typ.classList.remove('on');
    const wrap = document.createElement('div');
    wrap.className = 'lcWrap';
    const b = document.createElement('div');
    b.className = 'lcBub lcBot';
    b.innerHTML = d.msg.replace(/\n/g,'<br>');
    wrap.appendChild(b);
    if (d.cta) {
      const a = document.createElement('a');
      a.className = 'lcCTA'; a.href = LC_URL;
      a.innerHTML = '✅ Assinar agora — R$29,90/mês →';
      wrap.appendChild(a);
    }
    if (d.wa) {
      const a = document.createElement('a');
      a.className = 'lcCTA lcWA'; a.href = LC_WA; a.target = '_blank';
      a.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Falar no WhatsApp';
      wrap.appendChild(a);
    }
    document.getElementById('lcMsgs').appendChild(wrap);
    lcScroll();
    if (d.opts && d.opts.length) {
      const qr = document.getElementById('lcQR');
      d.opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'lcQ'; btn.textContent = o;
        btn.onclick = () => lcStep(o, o);
        qr.appendChild(btn);
      });
    }
  }, userLabel ? 700 : 450);
}

function lcBubble(side, text) {
  const wrap = document.createElement('div');
  wrap.className = 'lcWrap' + (side === 'u' ? ' u' : '');
  const b = document.createElement('div');
  b.className = 'lcBub ' + (side === 'u' ? 'lcUsr' : 'lcBot');
  b.textContent = text;
  wrap.appendChild(b);
  document.getElementById('lcMsgs').appendChild(wrap);
  lcScroll();
}

function lcScroll() {
  const el = document.getElementById('lcMsgs');
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

// Abre após 90s — calibrado para usuário 40-60+ que lê devagar
setTimeout(() => { if (!lcOpen) lcTog(); }, 90000);
</script>
<!-- FIM DO WIDGET ===================================== -->

</body>
</html>
